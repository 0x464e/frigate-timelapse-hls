server {
    listen 6773;
    server_name _;

    root /usr/share/nginx/site;
    index player.html;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    location = / {
        try_files /player.html =404;
    }

    location / {
        try_files $uri =404;
    }

    location /published/ {
        alias /usr/share/nginx/output/published/;
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }
}
